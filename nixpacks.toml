[phases.setup]
nixPkgs = ["nodejs_20", "postgresql"]

[phases.install]
cmds = ["npm ci --legacy-peer-deps"]

[phases.build]
cmds = [
  "npm run db:generate",
  "cd apps/api && npx tsc -p tsconfig.json",
  "cd apps/web && npx vite build"
]

[start]
cmd = "psql $DATABASE_URL -c \"UPDATE \\\"_prisma_migrations\\\" SET finished_at = NOW(), applied_steps_count = 1, logs = NULL WHERE migration_name = '20260504000001_training_target_users' AND finished_at IS NULL;\" ; cd apps/api && npx prisma migrate deploy --schema ../../packages/db/prisma/schema.prisma && node -r tsconfig-paths/register dist/src/index.js"
